name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm run build
      # - run: cd backend && npm test

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: az acr login --name ${{ secrets.ACR_NAME }}
      - run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/stekkiesnackie:${{ github.sha }} ./backend
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/stekkiesnackie:${{ github.sha }}
      - uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: stekkiesnackie-backend
          acrName: ${{ secrets.ACR_NAME }}
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/stekkiesnackie:${{ github.sha }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}